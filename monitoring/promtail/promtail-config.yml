server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker

    static_configs:
      - targets:
          - localhost

        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

  - job_name: "freshlense-backend"

    static_configs:
      - targets:
          - backend:8000

  - job_name: "node-exporter"
  
    static_configs:
      - targets:
          - node-exporter:9100