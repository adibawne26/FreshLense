services:

  mongodb:
    image: mongo:7
    container_name: freshlense-mongodb

    restart: unless-stopped

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_DATABASE: freshlense

    volumes:
      - mongo-data:/data/db

    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    image: adityabawne37/freshlense-backend:latest
    container_name: freshlense-backend

    depends_on:
      mongodb:
        condition: service_healthy

    restart: unless-stopped

    expose:
      - "8000"

    environment:
      MONGO_URI: mongodb://mongodb:27017/freshlense

  frontend:
    image: adityabawne37/freshlense-frontend:latest
    container_name: freshlense-frontend

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    ports:
      - "80:80"

    environment:
      REACT_APP_BACKEND_URL: http://backend:8000

volumes:
  mongo-data: